<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c542"/>
      <stop offset="50%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6c9fff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#f5c542" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Glow aura -->
  <circle cx="16" cy="16" r="10" fill="url(#glow)" opacity="0.3"/>

  <!-- Sword blade (pointing up) -->
  <polygon points="16,4 17.5,14 16,15.5 14.5,14" fill="url(#blade)"/>

  <!-- Sword crossguard -->
  <rect x="11" y="14.5" width="10" height="2" rx="1" fill="#f5c542"/>

  <!-- Sword handle -->
  <rect x="15" y="16.5" width="2" height="6" rx="0.8" fill="#a0522d"/>

  <!-- Pommel -->
  <circle cx="16" cy="23.5" r="1.5" fill="#f5c542"/>

  <!-- Star sparkles -->
  <circle cx="9" cy="8" r="0.8" fill="#f5c542" opacity="0.9"/>
  <circle cx="23" cy="7" r="0.6" fill="#fff" opacity="0.8"/>
  <circle cx="24" cy="22" r="0.7" fill="#b388ff" opacity="0.9"/>
  <circle cx="8" cy="21" r="0.5" fill="#6c9fff" opacity="0.8"/>
</svg>
